name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Verify fixtures are up to date
        run: |
          npm run gen:fixtures
          if ! git diff --quiet fixtures/; then
            echo "::error::Fixtures out of date. Run 'npm run gen:fixtures' and commit."
            git diff fixtures/
            exit 1
          fi
